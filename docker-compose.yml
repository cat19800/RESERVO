services:
  postgres:
    image: postgres:16-alpine
    container_name: reservo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reservo
      POSTGRES_PASSWORD: reservo
      POSTGRES_DB: reservo
    ports:
      # Host 5433 → container 5432. 5433 avoids clashing with a local Postgres.
      - '5433:5432'
    volumes:
      - reservo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U reservo -d reservo']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  reservo-pgdata:
    name: reservo-pgdata
